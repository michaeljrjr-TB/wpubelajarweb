<html lang="en">
  <head>

    <title>Coba box Model</title>
    <style>
      * {
        padding: 0;
        margin: 0;
      }
      .kotak1 {
        height: 300px;
        width: 300px;
        background-color: lightblue;

        width: 200px;
        height: 200px;
        background-color: salmon;
        margin-top: -50px;
      }

    <div class="kotak1"></div>
    <div class="kotak2"></div>
  </body>
</html>
